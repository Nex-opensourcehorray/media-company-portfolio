name: Terraform Validate

on:
  push:
    branches: ["feature/terraform-f1-f6-scaffold"]
  pull_request:
    branches: ["main"]

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5

      - name: Terraform fmt check
        run: |
          terraform fmt -check -recursive infrastructure

      - name: Terraform Init (bootstrap)
        working-directory: infrastructure/bootstrap
        run: terraform init -backend=false

      - name: Terraform Validate (bootstrap)
        working-directory: infrastructure/bootstrap
        run: terraform validate

      - name: Terraform Init (dev)
        working-directory: infrastructure/environments/dev
        run: terraform init -backend=false

      - name: Terraform Validate (dev)
        working-directory: infrastructure/environments/dev
        run: terraform validate

      - name: Terraform Init (F3 module)
        working-directory: infrastructure/modules/f3-vod-processing
        run: terraform init -backend=false

      - name: Terraform Validate (F3 module)
        working-directory: infrastructure/modules/f3-vod-processing
        run: terraform validate
